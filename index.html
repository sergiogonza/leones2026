<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>S.W.A.T BODYGUARDS</title>

<link href="https://fonts.cdnfonts.com/css/thegoodmonolith" rel="stylesheet">

<style>

:root{
--orange:#ff6a00;
--orangeGlow:rgba(255,106,0,.45);
--orangeSoft:rgba(255,106,0,.08);
--panel:rgba(12,12,12,.88);
--border:rgba(255,106,0,.25);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:"TheGoodMonolith", monospace;
color:#fff;
}

/* BACKGROUND */

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(255,106,0,.035) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,106,0,.035) 1px, transparent 1px);
background-size:40px 40px;
z-index:-3;
}

body::after{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at center, rgba(255,106,0,.12), transparent 65%);
z-index:-2;
}

/* ASCII BG */

.center-ascii{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:.08;
pointer-events:none;
z-index:-1;
animation:pulse 3s ease-in-out infinite;
max-width:100vw;
overflow:hidden;
}

.center-ascii pre{
font-size:7px;
line-height:7px;
color:#ff7b00;
text-shadow:0 0 14px rgba(255,106,0,.5);
}

@keyframes pulse{
0%{
opacity:.07;
transform:translate(-50%,-50%) scale(1);
}
50%{
opacity:.12;
transform:translate(-50%,-50%) scale(1.015);
}
100%{
opacity:.07;
transform:translate(-50%,-50%) scale(1);
}
}

/* BOOT SCREEN */

#boot{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
overflow:hidden;
}

.boot-logo{
animation:bootFloat 3s ease-in-out infinite;
display:flex;
justify-content:center;
align-items:center;
max-width:100%;
overflow:hidden;
}

.boot-logo pre{
font-size:8px;
line-height:8px;
color:#ff7b00;
text-shadow:0 0 16px rgba(255,106,0,.6);
transform-origin:center;
}

@keyframes bootFloat{
0%{
transform:translateY(0px);
opacity:.9;
}
50%{
transform:translateY(-5px);
opacity:1;
}
100%{
transform:translateY(0px);
opacity:.9;
}
}

.boot-title{
margin-top:20px;
font-size:42px;
letter-spacing:14px;
color:#ff7b00;
text-shadow:0 0 22px rgba(255,106,0,.5);
text-align:center;
}

.enter-btn{
margin-top:25px;
padding:14px 34px;
background:rgba(255,106,0,.08);
border:1px solid rgba(255,106,0,.35);
color:#ff7b00;
font-family:inherit;
cursor:pointer;
transition:.25s;
font-size:14px;
letter-spacing:2px;
}

.enter-btn:hover{
background:rgba(255,106,0,.15);
box-shadow:0 0 25px rgba(255,106,0,.2);
transform:translateY(-2px);
}

/* LOGIN */

#loginScreen{
position:fixed;
inset:0;
background:rgba(0,0,0,.94);
display:none;
justify-content:center;
align-items:center;
z-index:9998;
padding:20px;
}

.login-box{
width:420px;
max-width:100%;
background:rgba(10,10,10,.96);
border:1px solid rgba(255,106,0,.25);
padding:30px;
box-shadow:0 0 35px rgba(255,106,0,.12);
}

.login-title{
color:#ff7b00;
font-size:16px;
margin-bottom:25px;
letter-spacing:2px;
text-align:center;
}

.login-box input{
width:100%;
padding:14px;
margin-bottom:14px;
background:#000;
border:1px solid rgba(255,106,0,.2);
color:#ff7b00;
outline:none;
font-family:inherit;
}

.login-btn{
width:100%;
padding:14px;
background:rgba(255,106,0,.08);
border:1px solid rgba(255,106,0,.25);
color:#ff7b00;
font-family:inherit;
cursor:pointer;
transition:.2s;
}

.login-btn:hover{
background:rgba(255,106,0,.16);
}

/* DESKTOP */

#desktop{
display:none;
width:100%;
height:100vh;
position:relative;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
position:absolute;
left:28px;
top:40px;
display:flex;
flex-direction:column;
gap:26px;
z-index:50;
}

.folder{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
width:80px;
transition:.2s;
}

.folder:hover{
transform:translateX(5px);
}

.folder svg{
width:60px;
height:60px;
fill:rgba(255,106,0,.38);
filter:drop-shadow(0 0 10px rgba(255,106,0,.22));
}

.folder span{
margin-top:7px;
font-size:11px;
letter-spacing:1px;
color:#ff7b00;
text-align:center;
}

/* WINDOWS */

.window{
position:absolute;
width:560px;
max-width:95vw;
max-height:90vh;
background:rgba(10,10,10,.94);
border:1px solid rgba(255,106,0,.22);
backdrop-filter:blur(12px);
box-shadow:0 0 35px rgba(255,106,0,.1);
overflow:hidden;
resize:both;
min-width:280px;
min-height:180px;
}

.window-header{
height:42px;
background:rgba(255,106,0,.06);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
border-bottom:1px solid rgba(255,106,0,.15);
cursor:move;
}

.window-title{
font-size:12px;
letter-spacing:1px;
color:#ff7b00;
}

.window-close{
background:none;
border:none;
color:#ff7b00;
font-size:18px;
cursor:pointer;
}

.window-body{
padding:16px;
max-height:calc(90vh - 42px);
overflow-y:auto;
}

/* TERMINAL */

.terminal{
background:#000;
padding:16px;
border:1px solid rgba(255,106,0,.15);
min-height:150px;
}

.terminal-line{
font-size:12px;
color:#ff7b00;
margin-bottom:12px;
}

.terminal input{
width:100%;
background:none;
border:none;
outline:none;
color:#ff7b00;
font-family:inherit;
}

/* VIDEOS */

.video-item{
padding:12px;
border-bottom:1px solid rgba(255,106,0,.08);
cursor:pointer;
font-size:12px;
transition:.2s;
color:#ff7b00;
word-break:break-word;
}

.video-item:hover{
background:rgba(255,106,0,.08);
padding-left:18px;
}

/* VIDEO */

.video-player video{
width:100%;
max-height:70vh;
background:#000;
}

/* SCROLL */

.window-body::-webkit-scrollbar{
width:6px;
}

.window-body::-webkit-scrollbar-thumb{
background:#ff6a00;
}

/* ASCII */

pre{
white-space:pre;
font-family:monospace;
}

/* TABLET */

@media(max-width:900px){

.boot-logo pre,
.center-ascii pre{
font-size:4px;
line-height:4px;
}

.boot-title{
font-size:28px;
letter-spacing:8px;
}

.enter-btn{
padding:12px 24px;
font-size:12px;
}

.sidebar{
left:12px;
top:20px;
gap:18px;
}

.folder{
width:70px;
}

.folder svg{
width:48px;
height:48px;
}

.window{
width:92vw;
left:4vw !important;
top:8vh !important;
resize:none;
}

}

/* MOBILE */

@media(max-width:600px){

body{
overflow:hidden;
}

#boot{
padding:12px;
}

.boot-logo pre,
.center-ascii pre{
font-size:2px;
line-height:2px;
}

.boot-title{
font-size:18px;
letter-spacing:5px;
margin-top:8px;
}

.enter-btn{
margin-top:14px;
padding:10px 18px;
font-size:10px;
width:180px;
max-width:90%;
}

.login-box{
padding:20px;
}

.login-title{
font-size:13px;
}

.sidebar{
position:absolute;
left:0;
top:auto;
bottom:0;
width:100%;
height:95px;
padding:10px;
background:rgba(0,0,0,.85);
border-top:1px solid rgba(255,106,0,.12);
display:flex;
flex-direction:row;
justify-content:center;
align-items:center;
gap:18px;
backdrop-filter:blur(10px);
}

.folder{
width:70px;
}

.folder svg{
width:42px;
height:42px;
}

.folder span{
font-size:9px;
}

.window{
width:96vw !important;
height:auto;
min-width:auto;
max-height:78vh;
left:2vw !important;
top:6vh !important;
resize:none;
}

.window-header{
height:38px;
padding:0 10px;
}

.window-title{
font-size:10px;
}

.window-body{
padding:12px;
}

.terminal{
padding:12px;
}

.terminal-line,
.video-item{
font-size:10px;
}

.video-player video{
max-height:55vh;
}

}

/* EXTRA SMALL */

@media(max-width:420px){

.boot-logo pre,
.center-ascii pre{
font-size:1.5px;
line-height:1.5px;
}

.boot-title{
font-size:15px;
letter-spacing:3px;
}

.enter-btn{
font-size:9px;
padding:9px 14px;
}

.folder svg{
width:36px;
height:36px;
}

.folder span{
font-size:8px;
}

.window{
top:4vh !important;
}

}

</style>
</head>

<body>

<!-- TU HTML Y JS CONTINÚAN EXACTAMENTE IGUAL -->

</body>
</html>
